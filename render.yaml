# Render Blueprint Specification for Price Drop Alert Backend
# Reference: https://render.com/docs/blueprints

services:
  - type: web
    name: price-drop-alert-backend
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # User will provide this in the dashboard
        placeholder: "mongodb+srv://<user>:<password>@cluster0.mongodb.net/priceDrop"
      
      - key: CLIENT_URL
        sync: false
        placeholder: "https://your-frontend-domain.vercel.app"

      - key: REDIS_ENABLED
        value: "false" # Default to false for Free tier (runs internal scheduler)
      
      - key: REDIS_URL
        sync: false
        placeholder: "redis://your-redis-server:6379"

      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure random 256-bit string

      - key: JWT_ACCESS_EXPIRES_IN
        value: "15m"
      
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"

      # Email Verification (SMTP) Setup
      - key: EMAIL_FROM
        sync: false
        placeholder: "noreply@yourdomain.com"
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: EMAIL_USER
        sync: false
        placeholder: "your-email@gmail.com"
      - key: EMAIL_PASS
        sync: false
        placeholder: "your-app-password"

      # OTP & Product Settings
      - key: OTP_LENGTH
        value: "6"
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      - key: PASSWORD_RESET_EXPIRY_MINUTES
        value: "15"
      - key: BCRYPT_COST_PASSWORD:
        value: "12"
      - key: BCRYPT_COST_OTP
        value: "10"
      
      # Tracking Settings
      - key: PRICE_TRACKING_CRON
        value: "0 0 * * *"
      - key: PRICE_HISTORY_RETENTION_DAYS
        value: "365"
      
      # Prices API (If used)
      - key: PRICES_API_KEY
        sync: false
      - key: PRICES_API_BASE_URL
        value: "https://api.pricesapi.io/api/v1"
      - key: PRICES_API_DEFAULT_COUNTRY
        value: "us"
      - key: PRICES_API_SEARCH_LIMIT
        value: "3"
      - key: PRICES_API_OFFERS_LIMIT
        value: "10"

      # Twilio Setup (Optional)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_SMS_FROM
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
