services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/price_drop
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_in_production}
      CLIENT_URL: http://localhost:8080
      CRON_SCHEDULE: '*/30 * * * *'
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  mongo_data:
